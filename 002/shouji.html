<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主屏幕</title>
    <style>
        :root {
            --phone-w: 325px;
            --phone-h: 620px;
            --green: #34c759;
            --red: #ff3b30;
            --blue: #007aff;
            --weibo-color: #e6162d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none; padding: 15px;
        }
        .phone {
            width: var(--phone-w); height: var(--phone-h);
            background: #1c1c1e; border-radius: 28px; padding: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #333;
            position: relative;
        }
        .phone::before {
            content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 18px; background: #1c1c1e; border-radius: 0 0 12px 12px; z-index: 10;
        }
        .phone::after {
            content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 35px; height: 3px; background: #444; border-radius: 3px; z-index: 10;
        }
        .screen {
            width: 100%; height: 100%; background: #fff; border-radius: 20px; overflow: hidden; position: relative;
        }
        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column;
        }
        .page.active { display: flex; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .page-home {
            background: linear-gradient(160deg, #e8ecf1 0%, #d5dbe3 40%, #c8d6e5 100%);
            justify-content: center; align-items: center; gap: 35px;
        }
        .page-home .time-bar {
            position: absolute; top: 0; left: 0; right: 0; padding: 8px 16px 4px;
            display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #1c1c1e;
        }
        .icon-btn {
            width: 60px; height: 60px; border-radius: 16px; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; font-size: 24px; color: #fff;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }
        .icon-btn:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
        .icon-btn .label { font-size: 9px; font-weight: 500; }
        .btn-call { background: linear-gradient(135deg, #34c759, #28a745); }
        .btn-weibo { background: linear-gradient(135deg, #ff6b6b, #e6162d); }
        .icon-row { display: flex; gap: 30px; justify-content: center; }

        .power-off-btn {
            display: flex; align-items: center; justify-content: center;
            width: 120px; padding: 10px 0; margin: 20px auto 0;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 24px;
            color: #333; font-size: 13px; font-weight: 500; letter-spacing: 1px;
            cursor: pointer; text-decoration: none; transition: background 0.2s;
        }
        .power-off-btn:active { background: rgba(0,0,0,0.4); }
    </style>
</head>
<body>
<div class="phone">
    <div class="screen">
        <div class="page page-home active" id="pageHome">
            <div class="time-bar">
                <span id="clockTime">9:41</span>
                <span>📶 🔋</span>
            </div>
            <div class="icon-row">
                <button class="icon-btn btn-call" onclick="location.href='dianhua.html'">📞<span class="label">电话</span></button>
                <button class="icon-btn btn-weibo" onclick="location.href='luntan.html'">🐦<span class="label">论坛</span></button>
            </div>
            <button class="power-off-btn" onclick="location.href='room2.html'">关闭手机</button>
        </div>
    </div>
</div>
<script>
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clockTime').textContent = hours + ':' + minutes;
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
