<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>解密程序</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #142433, #050a10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.2rem;
      position: relative; /* 为固定定位按钮提供包含块上下文，不影响布局 */
    }

    .core {
      width: 100%;
      max-width: 460px;
      background: rgba(18, 30, 45, 0.55);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border-radius: 3.5rem;
      padding: 2.5rem 2rem 2.8rem;
      border: 1px solid rgba(100, 170, 255, 0.18);
      box-shadow: 0 30px 50px -15px #000000b0, 0 0 0 1px rgba(60, 130, 255, 0.1) inset;
      transition: box-shadow 0.3s;
    }

    .intro {
      text-align: center;
      margin-bottom: 1.8rem;
      color: #9ab9e0;
      font-weight: 300;
      letter-spacing: 2px;
      font-size: 0.9rem;
      text-transform: uppercase;
      opacity: 0.75;
      border-bottom: 1px solid #2e4f70;
      padding-bottom: 1rem;
    }

    .intro i {
      font-style: normal;
      margin: 0 6px;
      color: #7aabff;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 2rem;
    }

    .cipher-input {
      width: 100%;
      background: rgba(5, 14, 24, 0.7);
      border: 1.5px solid rgba(70, 140, 250, 0.25);
      border-radius: 60px;
      padding: 1.2rem 1.8rem;
      font-size: 1.5rem;
      font-weight: 450;
      color: #eaf1ff;
      text-align: center;
      letter-spacing: 3px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      outline: none;
      box-shadow: inset 0 8px 14px #00000055, 0 4px 12px #00000030;
      transition: all 0.25s ease;
      backdrop-filter: blur(5px);
    }

    .cipher-input:focus {
      border-color: #5f9eff;
      box-shadow: inset 0 6px 12px #000, 0 0 18px #2a6ebb, 0 4px 12px #00000060;
      background: rgba(8, 20, 36, 0.8);
    }

    .cipher-input::placeholder {
      color: #4e6f91;
      font-size: 1rem;
      letter-spacing: 2px;
      font-weight: 300;
    }

    .decrypt-btn {
      width: 100%;
      background: rgba(20, 50, 90, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(90, 160, 255, 0.5);
      border-radius: 60px;
      padding: 1.1rem;
      font-size: 1.4rem;
      font-weight: 500;
      color: #e6f0ff;
      text-transform: uppercase;
      letter-spacing: 6px;
      cursor: pointer;
      box-shadow: 0 10px 22px -8px #000000aa, 0 1px 2px #b0d0ff55 inset;
      transition: all 0.2s;
      margin-bottom: 2.2rem;
      border: 1px solid #3875c0;
    }

    .decrypt-btn:hover {
      background: rgba(30, 70, 130, 0.8);
      border-color: #7aafff;
      box-shadow: 0 14px 26px -8px #000, 0 0 12px #3f8cff88, 0 1px 2px #d0e2ff inset;
      transform: scale(1.01);
      color: white;
    }

    .decrypt-btn:active {
      transform: scale(0.98);
      box-shadow: 0 6px 12px #000, 0 0 8px #1e4b8a;
    }

    .result-container {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 50px;
      padding: 0.3rem;
      border: 1px solid rgba(110, 180, 255, 0.1);
    }

    .result-panel {
      background: #0a1622cc;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 44px;
      padding: 1.6rem 1.2rem;
      box-shadow: inset 0 6px 10px #00000088, 0 4px 10px #00000040;
      border: 1px solid #2a4b70;
    }

    .result-text {
      font-size: 3.2rem;
      font-weight: 600;
      text-align: center;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: #d0e5ff;
      text-shadow: 0 0 20px #3f8cff, 0 0 5px #a0c0ff;
      letter-spacing: 8px;
      word-break: break-all;
      min-height: 5.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .result-text.error {
      color: #ff9580;
      text-shadow: 0 0 18px #d94f4f, 0 0 5px #ffb0a0;
      letter-spacing: 6px;
    }

    .result-text.placeholder {
      color: #4f7193;
      text-shadow: none;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
    }

    .glow-dot {
      height: 4px;
      width: 40%;
      margin: 0 auto 1.2rem;
      background: linear-gradient(90deg, transparent, #4f9eff, transparent);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* 右下角页码 */
    .page-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      color: #1e3a5f;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 0 white;
      letter-spacing: 0.5px;
      background: linear-gradient(180deg, rgba(242, 247, 252, 0.85), rgba(221, 231, 242, 0.85) 45%, rgba(201, 217, 234, 0.85));
      border: 1px solid #8ba5c2;
      border-radius: 20px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.15);
      padding: 8px 20px;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }

    /* 左下角返回按钮 —— 新增样式 */
    .back-button {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      background: rgba(20, 40, 70, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(90, 160, 255, 0.45);
      border-radius: 40px;
      padding: 10px 24px;
      color: #d4e6ff;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px #000000cc, 0 0 8px #1f4b7a66 inset;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.2;
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .back-button:hover {
      background: rgba(28, 62, 110, 0.8);
      border-color: #7aafff;
      box-shadow: 0 12px 24px -8px #000000, 0 0 14px #3f8cff99, 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      color: #ffffff;
      transform: translateY(-1px);
    }

    .back-button:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px #000000, 0 0 6px #1e4b8a;
    }

    /* 小屏幕上让左下角和右下角元素不重叠 */
    @media (max-width: 640px) {
      .page-indicator {
        bottom: 16px;
        right: 16px;
        padding: 6px 16px;
        font-size: 13px;
      }

      .back-button {
        bottom: 16px;
        left: 16px;
        padding: 8px 18px;
        font-size: 0.9rem;
        letter-spacing: 1.5px;
      }
    }
  </style>
</head>
<body>

  <!-- 左下角返回按钮 -->
  <button class="back-button" onclick="location.href='huishouzhan.html'" title="返回回收站">
    ← 返回
  </button>

  <div class="page-indicator">14/18</div>

  <div class="core">
    <div class="intro">
      <i>◆</i> 密钥解密器 <i>◆</i>
    </div>

    <div class="input-wrapper">
      <input type="text" id="secretInput" class="cipher-input" placeholder="输入密钥" autocomplete="off" spellcheck="false">
    </div>
    <button class="decrypt-btn" id="unlockBtn">解密</button>
    <div class="glow-dot"></div>
    <div class="result-container">
      <div class="result-panel">
        <div id="resultDisplay" class="result-text placeholder">—</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const inputEl = document.getElementById('secretInput');
      const resultEl = document.getElementById('resultDisplay');
      const btn = document.getElementById('unlockBtn');

      const CODE_MAP = {
        'y59g': '2910'
      };

      function updateResult() {
        const raw = inputEl.value.trim();
        if (raw === '') {
          resultEl.textContent = '—';
          resultEl.classList.add('placeholder');
          resultEl.classList.remove('error');
          return;
        }
        
        const key = raw.toLowerCase();
        
        if (CODE_MAP.hasOwnProperty(key)) {
          resultEl.textContent = CODE_MAP[key];
          resultEl.classList.remove('error', 'placeholder');
        } else {
          resultEl.textContent = '错误';
          resultEl.classList.add('error');
          resultEl.classList.remove('placeholder');
        }
      }

      function initDisplay() {
        inputEl.value = '';
        resultEl.textContent = '—';
        resultEl.classList.add('placeholder');
        resultEl.classList.remove('error');
      }

      btn.addEventListener('click', updateResult);
      
      inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          updateResult();
        }
      });

      resultEl.addEventListener('dblclick', () => {
        const text = resultEl.textContent;
        if (text && text !== '错误' && text !== '—') {
          navigator.clipboard?.writeText(text).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          });
          resultEl.style.transition = 'text-shadow 0.1s';
          resultEl.style.textShadow = '0 0 30px #aad0ff, 0 0 15px #ffffff';
          setTimeout(() => resultEl.style.textShadow = '', 150);
        }
      });

      initDisplay();
    })();
  </script>
</body>
</html>
