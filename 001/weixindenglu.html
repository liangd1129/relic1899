<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>微信登录页面</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .wechat-card {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 32px 28px 36px;
      transition: all 0.2s ease;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .wechat-icon {
      width: 56px;
      height: 56px;
      background: #1AAD19;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(26, 173, 25, 0.2);
    }

    .wechat-icon i {
      font-size: 36px;
      color: white;
    }

    .card-header h2 {
      font-size: 22px;
      font-weight: 600;
      color: #191919;
    }

    .login-panel {
      display: block;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1c1c1e;
      margin-bottom: 8px;
    }

    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-with-icon i {
      position: absolute;
      left: 16px;
      color: #8e8e93;
      font-size: 18px;
      pointer-events: none;
    }

    .wechat-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background-color: #f8f8f8;
      border: 1.5px solid #e9e9e9;
      border-radius: 16px;
      font-size: 16px;
      color: #1c1c1e;
      outline: none;
      transition: border 0.15s, background 0.15s;
    }

    .wechat-input:focus {
      border-color: #1AAD19;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(26, 173, 25, 0.1);
    }

    .wechat-input::placeholder {
      color: #b3b3b3;
    }

    .login-btn {
      width: 100%;
      background-color: #1AAD19;
      color: white;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 18px;
      border: none;
      border-radius: 30px;
      margin: 16px 0 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 8px rgba(26, 173, 25, 0.25);
    }

    .login-btn:hover {
      background-color: #14a014;
    }

    .forgot-link {
      text-align: right;
      margin-bottom: 8px;
    }

    .forgot-link a {
      color: #576b95;
      font-size: 15px;
      text-decoration: none;
      font-weight: 500;
    }

    .message-bar {
      min-height: 36px;
      font-size: 14px;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 12px;
      background: #fef0f0;
      color: #d9534f;
      display: flex;
      align-items: center;
      border-left: 4px solid #d9534f;
    }

    .message-bar.success {
      background: #e8f7e8;
      color: #1e7b1e;
      border-left-color: #1AAD19;
    }

    .message-bar i {
      margin-right: 8px;
      font-size: 16px;
    }

    .forgot-panel {
      display: none;
    }

    .back-to-login {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      cursor: pointer;
      color: #576b95;
      font-weight: 500;
      font-size: 15px;
    }

    .back-to-login i {
      margin-right: 6px;
    }

    .forgot-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #191919;
    }

    .forgot-desc {
      font-size: 14px;
      color: #6c6c70;
      margin-bottom: 28px;
    }

    .verify-btn {
      width: 100%;
      background-color: #1AAD19;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 600;
      margin: 20px 0 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(26, 173, 25, 0.2);
    }

    .login-wechat-btn {
      width: 100%;
      background-color: #1AAD19;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 700;
      margin-top: 20px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(26, 173, 25, 0.3);
      display: none;
    }

    .extra-links {
      display: flex;
      justify-content: space-around;
      margin-top: 24px;
      color: #576b95;
      font-size: 14px;
    }

    .page-indicator {
      position: fixed;
      bottom: 20px;
      right: 30px;
      color: #a8a8a8;
      font-size: 14px;
      font-weight: 400;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 6px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      letter-spacing: 1px;
      z-index: 50;
    }

    .back-link {
      position: absolute;
      bottom: 20px;
      left: 30px;
      color: #153e5c;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      z-index: 50;
      transition: background 0.15s;
    }
  </style>
</head>
<body>
<div class="wechat-card">
  <div class="card-header">
    <div class="wechat-icon">
      <i class="fab fa-weixin"></i>
    </div>
    <h2>微信</h2>
  </div>

  <!-- 登录面板 -->
  <div id="loginPanel" class="login-panel">
    <div class="input-group">
      <label class="input-label">微信号 / 手机号 / QQ号</label>
      <div class="input-with-icon">
        <i class="far fa-user-circle"></i>
        <input type="text" id="wechatAccountInput" class="wechat-input" placeholder="请输入微信号" value="">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">密码</label>
      <div class="input-with-icon">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" class="wechat-input" placeholder="请输入密码" value="">
      </div>
    </div>

    <div class="forgot-link">
      <a href="#" id="forgotPasswordLink">忘记密码？</a>
    </div>

    <button id="loginMainBtn" class="login-btn">登 录</button>

    <div class="extra-links">
      <span>语言</span>
      <span>·</span>
      <span>更多选项</span>
    </div>
  </div>

  <!-- 找回密码面板 -->
  <div id="forgotPanel" class="forgot-panel">
    <div class="back-to-login" id="backToLoginBtn">
      <i class="fas fa-arrow-left"></i> 返回登录
    </div>
    <div class="forgot-title">找回账号密码</div>
    <div class="forgot-desc">请输入绑定的微信号和手机号，验证通过后可登录</div>

    <div class="input-group">
      <label class="input-label">微信号</label>
      <div class="input-with-icon">
        <i class="far fa-user-circle"></i>
        <input type="text" id="forgotWechatInput" class="wechat-input" placeholder="请输入微信号" value="">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">手机号</label>
      <div class="input-with-icon">
        <i class="fas fa-mobile-alt"></i>
        <input type="tel" id="phoneInput" class="wechat-input" placeholder="请输入手机号" value="">
      </div>
    </div>

    <button id="verifyBtn" class="verify-btn">验证信息</button>

    <div id="forgotMessage" class="message-bar" style="margin-top: 8px;">
      <i class="fas fa-info-circle"></i>
      <span id="forgotMsgText">输入微信号和手机号，点击验证</span>
    </div>

    <button id="loginAfterVerifyBtn" class="login-wechat-btn">
      <i class="fab fa-weixin" style="margin-right: 8px;"></i>登录微信
    </button>
  </div>
</div>

<!-- 右下角页码标识（毛玻璃效果） -->
<div class="page-indicator">3/19</div>
<a href="window.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回桌面</a>

<script>
  (function() {
    "use strict";

    // ✅ 如果曾经登录成功过，直接跳转到 weixin.html，不显示本页
    if (localStorage.getItem('wechatLogged') === 'true') {
        location.replace('weixin.html');
        return;
    }

    const PRESET_WECHAT_ID = 'alexshen0110';
    const CANCELLED_PHONE = '138112805';
    const CORRECT_PHONE = '183794677';

    const loginPanel = document.getElementById('loginPanel');
    const forgotPanel = document.getElementById('forgotPanel');
    const accountInput = document.getElementById('wechatAccountInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginMainBtn = document.getElementById('loginMainBtn');
    const loginMessageDiv = document.getElementById('loginMessage');
    const loginMsgText = document.getElementById('loginMsgText');
    const forgotLink = document.getElementById('forgotPasswordLink');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    const forgotWechatInput = document.getElementById('forgotWechatInput');
    const phoneInput = document.getElementById('phoneInput');
    const verifyBtn = document.getElementById('verifyBtn');
    const forgotMessageDiv = document.getElementById('forgotMessage');
    const forgotMsgText = document.getElementById('forgotMsgText');
    const loginAfterVerifyBtn = document.getElementById('loginAfterVerifyBtn');

    function setLoginMessage(text, isSuccess = false) {
      if (!loginMsgText) return;
      loginMsgText.textContent = text;
      if (isSuccess) {
        loginMessageDiv.classList.add('success');
        loginMessageDiv.style.background = '#e8f7e8';
        loginMessageDiv.style.color = '#1e7b1e';
        loginMessageDiv.style.borderLeftColor = '#1AAD19';
        const icon = loginMessageDiv.querySelector('i');
        if (icon) icon.className = 'fas fa-check-circle';
      } else {
        loginMessageDiv.classList.remove('success');
        loginMessageDiv.style.background = '#fef0f0';
        loginMessageDiv.style.color = '#d9534f';
        loginMessageDiv.style.borderLeftColor = '#d9534f';
        const icon = loginMessageDiv.querySelector('i');
        if (icon) icon.className = 'fas fa-exclamation-circle';
      }
    }

    function setForgotMessage(text, isSuccess = false, isNeutral = false) {
      forgotMsgText.textContent = text;
      forgotMessageDiv.classList.remove('success');
      if (isSuccess) {
        forgotMessageDiv.style.background = '#e8f7e8';
        forgotMessageDiv.style.color = '#1e7b1e';
        forgotMessageDiv.style.borderLeftColor = '#1AAD19';
        const icon = forgotMessageDiv.querySelector('i');
        if (icon) icon.className = 'fas fa-check-circle';
      } else if (isNeutral) {
        forgotMessageDiv.style.background = '#f0f7ff';
        forgotMessageDiv.style.color = '#1c1c1e';
        forgotMessageDiv.style.borderLeftColor = '#576b95';
        const icon = forgotMessageDiv.querySelector('i');
        if (icon) icon.className = 'fas fa-info-circle';
      } else {
        forgotMessageDiv.style.background = '#fef0f0';
        forgotMessageDiv.style.color = '#d9534f';
        forgotMessageDiv.style.borderLeftColor = '#d9534f';
        const icon = forgotMessageDiv.querySelector('i');
        if (icon) icon.className = 'fas fa-exclamation-triangle';
      }
    }

    function resetForgotPanel() {
      forgotWechatInput.value = '';
      phoneInput.value = '';
      setForgotMessage('输入微信号和手机号，点击验证', false, true);
      loginAfterVerifyBtn.style.display = 'none';
    }

    function showLoginPanel() {
      loginPanel.style.display = 'block';
      forgotPanel.style.display = 'none';
    }

    function showForgotPanel() {
      loginPanel.style.display = 'none';
      forgotPanel.style.display = 'block';
      resetForgotPanel();
    }

    function handleLogin() {
      const account = accountInput.value.trim();
      if (account === '') {
        setLoginMessage('请输入微信号', false);
        return;
      }
      if (account !== PRESET_WECHAT_ID) {
        setLoginMessage(`账号错误，只能使用指定微信号: ${PRESET_WECHAT_ID}`, false);
        return;
      }
      setLoginMessage(`✓ 微信号正确，登录成功 (演示)`, true);
      // ✅ 记录登录成功状态，下次自动跳转
      localStorage.setItem('wechatLogged', 'true');
    }

   function handleVerify() {
     const wechatId = forgotWechatInput.value.trim();
     const phone = phoneInput.value.replace(/\s/g, '');
     loginAfterVerifyBtn.style.display = 'none';
   
     if (wechatId === '') {
       setForgotMessage('请输入微信号', false);
       return;
     }
     if (wechatId !== PRESET_WECHAT_ID) {
       setForgotMessage(`微信号错误，应为: ${PRESET_WECHAT_ID}`, false);
       return;
     }
     if (phone === '') {
       setForgotMessage('请输入手机号', false);
       return;
     }
     const phoneRegex = /^[0-9]{9}$/;
     if (!phoneRegex.test(phone)) {
       setForgotMessage('手机号格式不正确 (9位数字)', false);
       return;
     }
   
     if (phone === CORRECT_PHONE) {
       setForgotMessage('✓ 验证通过！微信号和手机号均正确', true);
       loginAfterVerifyBtn.style.display = 'block';
     } else if (phone === CANCELLED_PHONE) {
       setForgotMessage('⚠️ 该手机号已注销，无法找回', false);
       loginAfterVerifyBtn.style.display = 'none';
     } else {
       setForgotMessage('✗ 手机号错误，请重试', false);
       loginAfterVerifyBtn.style.display = 'none';
     }
   }

    function handleLoginWechatAfterVerify() {
      // ✅ 记录登录成功状态，下次自动跳转
      localStorage.setItem('wechatLogged', 'true');
      window.open('weixin.html', '_blank');
      setForgotMessage('找回成功！正在登录...', true);
    }

    loginMainBtn.addEventListener('click', handleLogin);
    accountInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleLogin(); } });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleLogin(); } });
    forgotLink.addEventListener('click', (e) => { e.preventDefault(); showForgotPanel(); });
    backToLoginBtn.addEventListener('click', (e) => { e.preventDefault(); showLoginPanel(); });
    verifyBtn.addEventListener('click', handleVerify);
    forgotWechatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleVerify(); } });
    phoneInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleVerify(); } });
    loginAfterVerifyBtn.addEventListener('click', handleLoginWechatAfterVerify);

    if (loginMsgText) setLoginMessage('请输入指定微信号 wechat_demo', false);
    accountInput.addEventListener('input', () => {
      const current = loginMsgText ? loginMsgText.textContent : '';
      if (current.includes('成功') || current.includes('✓')) {
        setLoginMessage('请输入指定微信号', false);
      }
    });

    showLoginPanel();
  })();
</script>
</body>
</html>
