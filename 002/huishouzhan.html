<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>回收站</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
    }

    body {
      background: #2d5a7b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* 主窗口 */
    .win7-window {
      width: 100%;
      max-width: 960px;
      background: #f0f5fb;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.6);
      border: 1px solid #a0b8cc;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }

    .window-titlebar {
      background: linear-gradient(180deg, #e9f2fa 0%, #d0e1f0 40%, #b8cfe5 100%);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #9cb6d0;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.7);
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .titlebar-icon {
      color: #1e4f7a;
      font-size: 20px;
      text-shadow: 1px 1px 0 white;
    }

    .titlebar-text {
      font-size: 14px;
      font-weight: 600;
      color: #1e3a5f;
    }

    .window-controls {
      display: flex;
      gap: 4px;
    }

    .win-btn {
      background: transparent;
      border: none;
      width: 30px;
      height: 24px;
      border-radius: 3px;
      color: #1e3a5f;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .win-btn.close:hover {
      background: #d55;
      color: white;
    }

    .address-bar {
      background: #e6edf5;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #b7c9da;
      flex-wrap: wrap;
    }

    .nav-buttons { display: flex; }
    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      width: 30px;
      height: 26px;
      border-radius: 3px;
      color: #2c4e6e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .address-path {
      flex: 1;
      background: white;
      border: 1px solid #a7bed6;
      border-radius: 3px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 140px;
    }

    .address-text {
      font-size: 13px;
      color: #1a2e44;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-box {
      background: white;
      border: 1px solid #a7bed6;
      border-radius: 15px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .search-box input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      width: 120px;
    }

    .toolbar {
      background: #e6edf5;
      padding: 4px 12px;
      border-bottom: 1px solid #b7c9da;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .toolbar-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 5px 10px;
      font-size: 13px;
      color: #1e3e5c;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: default;
    }
    .toolbar-btn.highlight {
      background: #d9e6f5;
      border-color: #a3bbd1;
      cursor: pointer;
    }

    .file-list-container {
      background: white;
    }

    .list-header {
      display: grid;
      grid-template-columns: 28px 3fr 1.2fr 1.2fr 1fr;
      background: #e1eaf3;
      border-bottom: 1px solid #b1c6d8;
      padding: 6px 12px 6px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #1e3a5f;
    }

    .file-list {
      min-height: 220px;
    }

    .file-row {
      display: grid;
      grid-template-columns: 28px 3fr 1.2fr 1.2fr 1fr;
      align-items: center;
      padding: 7px 12px 7px 8px;
      border-bottom: 1px solid #e6ecf2;
      font-size: 13px;
      background: white;
      cursor: default;
    }

    .file-row:hover {
      background: #e5f0fe;
    }

    .file-row[data-clickable="true"] {
      cursor: pointer;
    }

    .file-icon {
      font-size: 18px;
      color: #c49b3f;
      text-align: center;
    }

    .file-name {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar {
      background: #e6edf5;
      border-top: 1px solid #b7c9da;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #1e3a5f;
    }

    /* 新增文件淡入动画 */
    .new-row-added {
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      0% { opacity: 0; background: #f0f7cf; }
      100% { opacity: 1; background: white; }
    }

    /* ----- 模态对话框 (弹出密码框) ----- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .win7-dialog {
      width: 430px;
      max-width: 92%;
      background: #f0f5fb;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.7);
      border: 1px solid #8ba5c2;
      overflow: hidden;
      animation: dialogFadeIn 0.15s ease;
    }

    @keyframes dialogFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .dialog-titlebar {
      background: linear-gradient(180deg, #e9f2fa, #d0e1f0 40%, #b8cfe5);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #9cb6d0;
      font-weight: 600;
      color: #1e3a5f;
      text-shadow: 0 1px 0 white;
    }

    .dialog-titlebar i {
      color: #1e5780;
    }

    .dialog-close {
      margin-left: auto;
      font-size: 20px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
    }

    .dialog-close:hover {
      background: #d55;
      color: white;
    }

    .dialog-content {
      padding: 20px 20px 12px 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .dialog-icon {
      font-size: 36px;
      color: #c49b3f;
    }

    .dialog-message {
      font-size: 13px;
      color: #1e2f3e;
    }

    .dialog-input-area {
      padding: 0 20px 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dialog-input-area label {
      font-size: 13px;
      color: #1e3a5f;
      font-weight: 500;
      min-width: 55px;
    }

    .dialog-input-area .pwd-input {
      flex: 1;
      background: white;
      border: 1px solid #9bb3cc;
      border-radius: 3px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .dialog-error {
      padding: 0 20px 8px 20px;
      min-height: 28px;
      font-size: 12px;
      color: #c0422b;
    }

    .dialog-buttons {
      padding: 12px 20px 16px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid #d0dce8;
      background: #eaf1f9;
    }

    .win7-button {
      background: linear-gradient(180deg, #f2f7fc, #dde7f2 45%, #c9d9ea);
      border: 1px solid #8ba5c2;
      border-radius: 4px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #1e3a5f;
      box-shadow: inset 0 1px 1px white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 75px;
      justify-content: center;
    }

    .win7-button:hover {
      background: linear-gradient(180deg, #e5eff9, #d0e1f2 45%, #bfd3e8);
      border-color: #6f90b3;
    }

    .hint-text-inline {
      font-size: 12px;
      color: #4f6f8a;
      background: #eef3f9;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid #bccfe0;
      display: inline-block;
      margin-top: 6px;
    }

    /* 移动端适配 */
    @media screen and (max-width: 640px) {
      body { padding: 8px; align-items: center; }
      .win7-window { border-radius: 6px; }
      .window-titlebar { padding: 6px 8px; }
      .address-bar { padding: 5px 8px; }
      .address-path { min-width: 0; flex: 2; }
      .search-box { width: 100%; margin-top: 4px; }
      .search-box input { width: 100%; }
      .toolbar { padding: 6px 8px; }
      .toolbar-btn { padding: 4px 8px; font-size: 12px; }
      .list-header {
        grid-template-columns: 28px 2.5fr 1.5fr 1.2fr 0.8fr;
        padding: 5px 6px;
        font-size: 11px;
      }
      .file-row {
        grid-template-columns: 28px 2.5fr 1.5fr 1.2fr 0.8fr;
        padding: 6px 6px;
        font-size: 12px;
      }
      .file-list { min-height: 180px; }
      @media (max-width: 480px) {
        .list-header span:nth-child(4),
        .file-row .file-type { display: none; }
        .list-header, .file-row { grid-template-columns: 28px 2.5fr 1.5fr 0.8fr; }
      }
      .status-bar { padding: 6px 10px; font-size: 11px; }
    }
	
    /* 右下角固定装饰 */
    .page-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      
      color: #1e3a5f;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 0 white;
      letter-spacing: 0.5px;
      
      background: linear-gradient(180deg, rgba(242, 247, 252, 0.85), rgba(221, 231, 242, 0.85) 45%, rgba(201, 217, 234, 0.85));
      border: 1px solid #8ba5c2;
      border-radius: 20px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.15);
      
      padding: 8px 20px;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }
	
    /* 移动端适配 */
    @media (max-width: 640px) {
      .page-indicator {
        bottom: 16px;
        right: 16px;
        padding: 6px 16px;
        font-size: 13px;
      }
    }
	
  </style>
</head>
<body>
	<div class="page-indicator">5/18</div>
	
<div class="win7-window">
  <!-- 标题栏 -->
  <div class="window-titlebar">
    <div class="titlebar-left">
      <i class="fas fa-trash-alt titlebar-icon"></i>
      <span class="titlebar-text">回收站</span>
    </div>
    <div class="window-controls">
      <div class="win-btn"><i class="fas fa-minus"></i></div>
      <div class="win-btn"><i class="far fa-square"></i></div>
      <div class="win-btn close" id="closeWindowBtn"><i class="fas fa-times"></i></div>
    </div>
  </div>

  <!-- 地址栏 -->
  <div class="address-bar">
    <div class="nav-buttons">
      <div class="nav-btn"><i class="fas fa-arrow-left"></i></div>
      <div class="nav-btn"><i class="fas fa-arrow-right"></i></div>
    </div>
    <div class="address-path">
      <i class="fas fa-folder-open address-icon"></i>
      <span class="address-text"><i class="fas fa-chevron-right"></i> 回收站</span>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="搜索回收站" readonly disabled>
    </div>
  </div>

  <!-- 工具栏（含解压按钮） -->
  <div class="toolbar">
    <div class="toolbar-btn"><i class="fas fa-folder"></i> 组织 ▼</div>
    <div class="toolbar-btn"><i class="fas fa-share-alt"></i> 共享</div>
    <div class="toolbar-btn"><i class="fas fa-burn"></i> 刻录</div>
    <div class="toolbar-btn highlight" id="showExtractPanelBtn"><i class="fas fa-file-zipper"></i> 解压</div>
    <div style="flex:1"></div>
    <div class="toolbar-btn"><i class="fas fa-undo-alt"></i></div>
    <div class="toolbar-btn"><i class="fas fa-redo-alt"></i></div>
  </div>

  <!-- 文件列表区 -->
  <div class="file-list-container">
    <div class="list-header">
      <span></span>
      <span>名称 <i class="fas fa-sort-amount-down"></i></span>
      <span>修改日期</span>
      <span>类型</span>
      <span>大小</span>
    </div>
    <div class="file-list" id="fileList">
      <div class="file-row" id="zipFileRow" data-clickable="true">
        <div class="file-icon"><i class="far fa-file-archive"></i></div>
        <div class="file-name">
          <span>解密程序.zip</span>
        </div>
        <div class="file-modified">2017/4/18 15:22</div>
        <div class="file-type">压缩(zipped)文件夹</div>
        <div class="file-size">0.58 MB</div>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-left">
      <span id="itemCount">1 个对象</span>
      <span><i class="far fa-file-archive"></i> 1 个压缩文件</span>
    </div>
    <div class="status-right">
      <i class="fas fa-list-ul"></i> 详细信息
    </div>
  </div>
</div>

<!-- 模态对话框（密码弹出框） -->
<div class="modal-overlay" id="passwordModal">
  <div class="win7-dialog">
    <div class="dialog-titlebar">
      <i class="fas fa-lock"></i>
      <span>需要密码</span>
      <div class="dialog-close" id="closeModalBtn">&times;</div>
    </div>
    <div class="dialog-content">
      <div class="dialog-icon">
        <i class="far fa-file-archive"></i>
      </div>
      <div class="dialog-message">
        <p>请输入密码以解压 “解密程序.zip”</p>
        <span class="hint-text-inline">
          <i class="fas fa-lightbulb"></i> 提示：结婚的日子
        </span>
      </div>
    </div>
    <div class="dialog-input-area">
      <label>密码(&P):</label>
      <input type="text" id="modalPasswordInput" class="pwd-input" placeholder="输入密码" autocomplete="off">
    </div>
    <div class="dialog-error" id="modalErrorMsg"></div>
    <div class="dialog-buttons">
      <button class="win7-button" id="modalExtractBtn">确定</button>
      <button class="win7-button" id="modalCancelBtn">取消</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const CORRECT_PASSWORD = '19610216';
    
    // DOM 元素
    const modalOverlay = document.getElementById('passwordModal');
    const modalPasswordInput = document.getElementById('modalPasswordInput');
    const modalExtractBtn = document.getElementById('modalExtractBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalErrorMsg = document.getElementById('modalErrorMsg');
    
    const showPanelBtn = document.getElementById('showExtractPanelBtn');
    const zipRow = document.getElementById('zipFileRow');
    const fileListDiv = document.getElementById('fileList');
    const itemCountSpan = document.getElementById('itemCount');
    const closeBtn = document.getElementById('closeWindowBtn');

    let isExtracted = false;
    let fileCount = 1;

    // 更新状态栏计数
    function updateItemCount() {
      itemCountSpan.textContent = fileCount + ' 个对象';
    }

    // 显示模态框
    function showPasswordModal() {
      modalOverlay.classList.add('show');
      modalPasswordInput.value = '';
      modalErrorMsg.textContent = '';
      modalPasswordInput.focus();
    }

    // 隐藏模态框
    function hidePasswordModal() {
      modalOverlay.classList.remove('show');
    }

    // 添加新文件 (解密程序.exe)
    function addNewFile() {
      if (isExtracted) return false;

      // 获取当前日期，格式：YYYY/MM/DD HH:mm
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentDate = `${year}/${month}/${day} ${hours}:${minutes}`;

      const newRow = document.createElement('div');
      newRow.className = 'file-row new-row-added';
      newRow.style.cursor = 'pointer'; // 显示手型光标
      newRow.innerHTML = `
        <div class="file-icon"><i class="far fa-file-alt" style="color: #3a7b9e;"></i></div>
        <div class="file-name">
          <span>解密程序.exe</span>
        </div>
        <div class="file-modified">${currentDate}</div>
        <div class="file-type">软件</div>
        <div class="file-size">1.2 MB</div>
      `;
      
     newRow.addEventListener('click', function() {
       window.open('jiemi.html', '_blank');
     });
      
      fileListDiv.appendChild(newRow);
      isExtracted = true;
      fileCount = 2;
      updateItemCount();
      return true;
    }

    // 处理解压（核心修改：强制校验密码）
    function handleExtract() {
      const pwd = modalPasswordInput.value.trim();
      
      // 1. 空值检查
      if (pwd === '') {
        modalErrorMsg.textContent = '请输入密码';
        modalPasswordInput.focus();
        return;
      }
      
      // 2. 密码验证：只有等于 19610216 才能继续
      if (pwd !== CORRECT_PASSWORD) {
        modalErrorMsg.textContent = '密码错误，请重试';
        modalPasswordInput.value = '';
        modalPasswordInput.focus();
        return;
      }

      // 3. 密码正确，且尚未解压过
      if (!isExtracted) {
        addNewFile();
        hidePasswordModal();
        // 成功后可显示一个小提示（非模态）
        setTimeout(() => {
          // 可选的状态栏反馈，但不需要额外操作
        }, 100);
      } else {
        // 已经解压过了，给出提示
        modalErrorMsg.textContent = '📁 文件已解压，无需重复操作';
        setTimeout(() => {
          hidePasswordModal();
        }, 1200);
      }
    }

    // 跳转至 win7.html
    function goToWin7() {
      window.location.href = 'win7.html';
    }

    // ----- 事件绑定 -----
    // 单击压缩文件行 → 弹出对话框
    zipRow.addEventListener('click', showPasswordModal);
    // 单击工具栏“解压”按钮 → 弹出对话框
    showPanelBtn.addEventListener('click', showPasswordModal);

    // 模态框内按钮
    modalExtractBtn.addEventListener('click', handleExtract);
    modalCancelBtn.addEventListener('click', hidePasswordModal);
    closeModalBtn.addEventListener('click', hidePasswordModal);

    // 按回车触发解压
    modalPasswordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleExtract();
      }
    });

    // 点击遮罩层关闭（可选）
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        hidePasswordModal();
      }
    });

    // 关闭窗口 (X按钮)
    closeBtn.addEventListener('click', goToWin7);

    // 初始化计数
    updateItemCount();

    // 移动端触摸优化
    window.addEventListener('touchstart', function(){}, {passive: true});

    // 若用户双击其他位置，不干扰
    // 为压缩文件行增加手型光标已在CSS定义

  })();
</script>
</body>
</html>
