<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电话</title>
    <style>
        :root {
            --phone-w: 325px;
            --phone-h: 620px;
            --green: #34c759;
            --red: #ff3b30;
            --blue: #007aff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding: 15px;
        }
        .phone {
            width: var(--phone-w);
            height: var(--phone-h);
            background: #1c1c1e;
            border-radius: 28px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 2px #333;
            position: relative;
        }
        .phone::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 18px;
            background: #1c1c1e;
            border-radius: 0 0 12px 12px;
            z-index: 10;
        }
        .phone::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 3px;
            background: #444;
            border-radius: 3px;
            z-index: 10;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }
        .page.active {
            display: flex;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-bar {
            display: flex;
            align-items: center;
            padding: 5px 8px;
            border-bottom: 1px solid #eee;
            gap: 6px;
            min-height: 40px;
            background: #fff;
        }
        .back-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .back-btn:active {
            background: #ddd;
        }

        /* ---------- 拨号页 ---------- */
        .page-call-dial {
            background: #1c1c1e;
            color: #fff;
            position: relative;
        }
        .page-call-dial .nav-bar {
            background: #1c1c1e;
            border-bottom: 1px solid #333;
            justify-content: flex-start;
        }
        .page-call-dial .nav-bar span {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            font-size: 13px;
        }
        .page-call-dial .back-btn {
            background: #333;
            color: #fff;
        }

        .dial-display {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
        }
        .dial-display input {
            width: 80%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-size: 24px;
            text-align: center;
            padding: 5px 3px;
            outline: none;
            letter-spacing: 2px;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            caret-color: #34c759;
        }
        .dial-display input::placeholder {
            color: #555;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .dial-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 12px 20px 20px;
            max-width: 280px;
            margin: 0 auto;
            width: 100%;
        }
        .dial-key {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            background: #333;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .dial-key:active {
            background: #555;
        }
        .dial-key.key-call {
            background: #34c759;
        }
        .dial-key.key-del {
            font-size: 16px;
            color: #aaa;
        }
        .dial-key.key-contacts {
            background: #444;
            font-size: 18px;
        }

        .contacts-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 20;
        }
        .contacts-overlay.show {
            display: flex;
        }
        .contacts-panel {
            background: #2c2c2e;
            border-radius: 16px 16px 0 0;
            padding: 14px 12px 20px;
            color: #fff;
            max-height: 60%;
            overflow-y: auto;
        }
        .contacts-panel h3 {
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #3a3a3c;
            cursor: pointer;
            font-size: 14px;
        }
        .contact-item:active {
            background: #3a3a3c;
            border-radius: 6px;
            padding-left: 6px;
            padding-right: 6px;
        }
        .close-contacts {
            background: #444;
            border: none;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        /* ---------- 通话结果页 ---------- */
        .page-call-result {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            color: #fff;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .result-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #34c759;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .result-icon.failed {
            background: #ff3b30;
        }
        .called-number {
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .status-text {
            font-size: 12px;
            color: #8e8e93;
        }
        .hangup-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #ff3b30;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hangup-btn:active {
            background: #d63029;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <!-- 拨号页 -->
            <div class="page page-call-dial active" id="pageCallDial">
                <div class="nav-bar">
                    <button class="back-btn" onclick="location.href='shouji.html'">←</button>
                    <span>拨号</span>
                </div>
                <div class="dial-display">
                    <input type="tel" id="dialInput" placeholder="输入手机号码" autocomplete="off" maxlength="15">
                </div>
                <div class="dial-pad">
                    <button class="dial-key" onclick="dialAppend('1')">1</button>
                    <button class="dial-key" onclick="dialAppend('2')">2</button>
                    <button class="dial-key" onclick="dialAppend('3')">3</button>
                    <button class="dial-key" onclick="dialAppend('4')">4</button>
                    <button class="dial-key" onclick="dialAppend('5')">5</button>
                    <button class="dial-key" onclick="dialAppend('6')">6</button>
                    <button class="dial-key" onclick="dialAppend('7')">7</button>
                    <button class="dial-key" onclick="dialAppend('8')">8</button>
                    <button class="dial-key" onclick="dialAppend('9')">9</button>
                    <button class="dial-key" onclick="dialAppend('*')">*</button>
                    <button class="dial-key" onclick="dialAppend('0')">0</button>
                    <button class="dial-key" onclick="dialAppend('#')">#</button>
                    <button class="dial-key key-del" onclick="dialDelete()">⌫</button>
                    <button class="dial-key key-call" onclick="doDial()">📞</button>
                    <button class="dial-key key-contacts" onclick="toggleContacts()">👥</button>
                </div>
                <div class="contacts-overlay" id="contactsOverlay">
                    <div class="contacts-panel">
                        <h3>📇 联系人</h3>
                        <div class="contact-item" onclick="contactAction('丈夫-徐静远')">丈夫-徐静远</div>
                        <div class="contact-item" onclick="contactAction('女儿-徐言')">女儿-徐言</div>
                        <button class="close-contacts" onclick="toggleContacts()">关闭</button>
                    </div>
                </div>
            </div>

            <!-- 通话结果页 -->
            <div class="page page-call-result" id="pageCallResult">
                <div class="result-icon" id="resultIcon">📞</div>
                <div class="called-number" id="resultNumber">—</div>
                <div class="status-text" id="resultStatus">正在呼叫...</div>
                <button class="hangup-btn" onclick="openPage('callDial')">✕</button>
                <button class="back-btn" style="position:absolute;top:8px;left:8px;background:#333;color:#fff;width:28px;height:28px;font-size:13px;" onclick="location.href='shouji.html'">←</button>
            </div>
        </div>
    </div>

    <script>
        let callTimer = null;

        // 页面切换（仅在拨号页和通话结果页之间）
        function openPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (callTimer) { clearTimeout(callTimer);
                callTimer = null; }
            const map = {
                'callDial': 'pageCallDial',
                'callResult': 'pageCallResult'
            };
            const target = map[pageName];
            if (target) {
                document.getElementById(target).classList.add('active');
            }
            document.getElementById('contactsOverlay').classList.remove('show');
        }

        // ========== 拨号逻辑 ==========
        function dialAppend(char) {
            const i = document.getElementById('dialInput');
            i.value += char;
            i.focus();
        }

        function dialDelete() {
            const i = document.getElementById('dialInput');
            i.value = i.value.slice(0, -1);
            i.focus();
        }
        document.getElementById('dialInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') doDial();
        });

        function doDial() {
            const input = document.getElementById('dialInput');
            const number = input.value.trim();
            if (!number) {
                input.placeholder = '请先输入手机号';
                input.style.borderBottomColor = '#ff3b30';
                setTimeout(() => { input.style.borderBottomColor = '#555';
                    input.placeholder = '输入手机号码'; }, 1000);
                return;
            }
            if (number === '1234567') {
                // 跳转到聊天页面
                location.href = 'liaotian.html';
            } else {
                document.getElementById('resultNumber').textContent = number;
                document.getElementById('resultStatus').textContent = '无法接通';
                document.getElementById('resultIcon').textContent = '❌';
                document.getElementById('resultIcon').classList.add('failed');
                openPage('callResult');
                setTimeout(() => {
                    document.getElementById('resultIcon').textContent = '📞';
                    document.getElementById('resultIcon').classList.remove('failed');
                    document.getElementById('resultStatus').textContent = '正在呼叫...';
                }, 1500);
            }
            input.value = '';
        }

        function toggleContacts() {
            document.getElementById('contactsOverlay').classList.toggle('show');
        }

        function contactAction(name) {
            toggleContacts();
            if (callTimer) clearTimeout(callTimer);
            const nd = document.getElementById('resultNumber');
            const sd = document.getElementById('resultStatus');
            const ic = document.getElementById('resultIcon');
            nd.textContent = name;
            sd.textContent = '正在呼叫...';
            ic.textContent = '📞';
            ic.classList.remove('failed');
            openPage('callResult');
            callTimer = setTimeout(() => {
                if (name === '女儿-徐言') {
                    // 跳转到聊天页面
                    location.href = 'liaotian.html';
                } else {
                    sd.textContent = '无法接通';
                    ic.textContent = '❌';
                    ic.classList.add('failed');
                    callTimer = setTimeout(() => {
                        ic.textContent = '📞';
                        ic.classList.remove('failed');
                        sd.textContent = '正在呼叫...';
                        nd.textContent = '—';
                    }, 1500);
                }
                callTimer = null;
            }, 2000);
        }
    </script>
</body>
</html>
